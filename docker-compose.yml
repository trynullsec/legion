services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: legion-postgres
    environment:
      POSTGRES_USER: legion
      POSTGRES_PASSWORD: legion
      POSTGRES_DB: legion
    ports:
      - "5434:5432"
    volumes:
      - legion-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legion -d legion"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  legion-pgdata:
