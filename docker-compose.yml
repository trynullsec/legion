services:
  postgres:
    image: pgvector/pgvector:pg16
    # No hardcoded container_name: Compose derives a per-project name from
    # COMPOSE_PROJECT_NAME (the installer scopes it per install dir), so two
    # checkouts never collide. The host port is configurable; default 5434
    # keeps DATABASE_URL's contract for single-install setups unchanged.
    environment:
      POSTGRES_USER: legion
      POSTGRES_PASSWORD: legion
      POSTGRES_DB: legion
    ports:
      - "${LEGION_PG_PORT:-5434}:5432"
    volumes:
      - legion-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legion -d legion"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  legion-pgdata:
